name: Apply Berthoud WiFi SEO and design refresh

on:
  push:
    branches: [main]
    paths:
      - "scripts/site_refresh.py"
      - "scripts/site_refresh_fix.py"
      - ".github/workflows/site-refresh.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --disable-pip-version-check beautifulsoup4 lxml pillow

      - name: Apply SEO, image, contact, and design updates
        run: |
          python scripts/site_refresh.py
          python scripts/site_refresh_fix.py

      - name: Commit generated site updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "Apply SEO, performance, contact, and design refresh [skip ci]"
          git push
